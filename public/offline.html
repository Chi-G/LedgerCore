<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forahia - Currently Offline</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 90%;
            width: 500px;
            padding: 2rem;
        }
        .logo {
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00d4ff;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            background-color: #00d4ff;
            color: #0a0a0a;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 212, 255, 0.2);
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Simple SVG logo placeholder -->
            <svg class="offline-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#00d4ff">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>It seems you don't have an internet connection right now. Please check your connection and try again.</p>
        <p>The Forahia app requires an internet connection to provide you with the latest content and features.</p>
        <a href="/" class="button">Try Again</a>
    </div>

    <script>
        // Check for connection restoration
        window.addEventListener('online', () => {
            window.location.reload();
        });

        document.querySelector('.button').addEventListener('click', (e) => {
            if (!navigator.onLine) {
                e.preventDefault();
                alert('You are still offline. Please check your internet connection.');
            }
        });
    </script>
</body>
</html>
